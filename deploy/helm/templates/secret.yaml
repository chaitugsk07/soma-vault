{{- if not .Values.secret.existingSecret }}
{{- if or (not .Values.secret.databaseUrl) (not .Values.secret.masterKekHex) (not .Values.secret.auditMasterSecret) (not .Values.secret.auditSigningKey) }}
{{- fail "Either secret.existingSecret or all four of secret.databaseUrl, secret.masterKekHex, secret.auditMasterSecret, and secret.auditSigningKey must be set." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soma-vault.fullname" . }}-credentials
  labels:
    {{- include "soma-vault.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
  SOMA_MASTER_KEK_HEX: {{ .Values.secret.masterKekHex | quote }}
  SOMA_AUDIT_MASTER_SECRET: {{ .Values.secret.auditMasterSecret | quote }}
  SOMA_AUDIT_SIGNING_KEY: {{ .Values.secret.auditSigningKey | quote }}
{{- end }}
