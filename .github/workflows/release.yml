name: Release

# Triggers on version tags pushed to the repo (e.g. v0.1.0, v1.2.3).
on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/soma-vault

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # ── Check out soma-vault ─────────────────────────────────────────────────
      # Mirror the sibling-checkout pattern used in ci.yml.
      # Each repo is checked out into a flat subdirectory so the relative
      # PATH deps in Cargo.toml resolve correctly inside the build context.

      - name: Checkout soma-vault
        uses: actions/checkout@v4
        with:
          path: soma-vault

      - name: Checkout soma-schema (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: chaitugsk07/soma-schema
          path: soma-schema
          token: ${{ secrets.SIBLINGS_TOKEN || github.token }}

      - name: Checkout soma-ui (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: chaitugsk07/soma-ui
          path: soma-ui
          token: ${{ secrets.SIBLINGS_TOKEN || github.token }}

      - name: Checkout soma-infra (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: chaitugsk07/soma-infra
          # The soma-infra repo nests the crate under a soma-infra/ subdirectory,
          # so check it out to a temp path and flatten it to the layout the
          # Dockerfile expects (soma-infra/Cargo.toml at the build-context root).
          path: _soma-infra-raw
          token: ${{ secrets.SIBLINGS_TOKEN || github.token }}

      - name: Flatten soma-infra checkout
        run: |
          if [ -f _soma-infra-raw/soma-infra/Cargo.toml ]; then
            mv _soma-infra-raw/soma-infra soma-infra
          else
            mv _soma-infra-raw soma-infra
          fi
          test -f soma-infra/Cargo.toml

      # ── Docker build tooling ─────────────────────────────────────────────────

      # QEMU enables building the linux/arm64 variant on the amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags + labels from the git tag / branch / SHA.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      # ── Build and push ───────────────────────────────────────────────────────
      # Build context is the current directory (which contains all four repos
      # as siblings).  The Dockerfile is at soma-vault/deploy/Dockerfile.

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: soma-vault/deploy/Dockerfile
          push: true
          # Multi-arch so Apple Silicon / ARM cloud (Graviton) can pull natively,
          # not just amd64. arm64 is emulated on the amd64 runner via QEMU.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in GitHub Actions cache for fast rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
