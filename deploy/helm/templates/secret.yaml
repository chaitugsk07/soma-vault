{{- if not .Values.secret.existingSecret }}
{{- if or (not .Values.secret.databaseUrl) (not .Values.secret.masterKekHex) }}
{{- fail "Either secret.existingSecret or both secret.databaseUrl and secret.masterKekHex must be set." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soma-vault.fullname" . }}-credentials
  labels:
    {{- include "soma-vault.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
  SOMA_MASTER_KEK_HEX: {{ .Values.secret.masterKekHex | quote }}
{{- end }}
