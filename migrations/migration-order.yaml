manifest_version: 1
versions:
  - version: 1
    description: "Phase-1 vault schema + seed data (EAV star schema, entity-type whitelist, attribute registry)"
    migrations:
      - file: "20260625_01_init-vault-schema.sql"
        created: "2026-06-25"
        author: "soma-vault"
        why: "Create 11-table EAV star schema: dim entity types/attr defs, fct projects/environments/secrets/config keys, append-only version ledgers, EAV dtl tables, auth tokens"
      - file: "20260625_01_seed-attribute-registry.sql"
        created: "2026-06-25"
        author: "soma-vault"
        why: "Seed the secret/config_key entity types and their default attribute definitions (INSERT-only seed; applied after the schema)"
      - file: "20260625_02_add-token-expires-at.sql"
        created: "2026-06-25"
        author: "soma-vault"
        why: "Add optional expires_at column to auth tokens; find_token_by_plaintext filters out expired tokens"
      - file: "20260626_01_add-tenants-table.sql"
        created: "2026-06-26"
        author: "soma-vault"
        why: "Add 00_dim_tenants table with deterministic default tenant UUID (v5/OID 'default') as the multi-tenant foundation"
      - file: "20260626_02_tenant-key-to-id.sql"
        created: "2026-06-26"
        author: "soma-vault"
        why: "Replace tenant_key VARCHAR(100) with tenant_id UUID FK on all 9 tenant-scoped tables; backfill with default tenant UUID"
      - file: "20260626_03_add-token-role.sql"
        created: "2026-06-26"
        author: "soma-vault"
        why: "Add role column to auth tokens for M0-4 RBAC; Principal carries role from day one; default admin so bootstrap root token is admin"
      - file: "20260626_04_enable-rls.sql"
        created: "2026-06-26"
        author: "soma-vault"
        why: "Enable FORCE ROW LEVEL SECURITY on all 9 tenant-scoped tables; tenant_isolation policy enforces app.tenant_id session variable as defense-in-depth backstop"
      - file: "20260626_05_audit-events.sql"
        created: "2026-06-26"
        author: "soma-vault"
        why: "Append-only HMAC hash-chained audit event log for SOC2/enterprise tamper detection"
      - file: "20260626_06_env-inheritance.sql"
        created: "2026-06-26"
        author: "soma-vault"
        why: "Add parent_env_id self-ref FK to 04_fct_environments enabling env inheritance; child env falls back to parent values for unset secrets/config (depth ≤ 5, cycle guard on write)"
